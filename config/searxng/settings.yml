# SearXNG - Configuração Nexus-Fullstack
# JSON habilitado para integração com Hermes e Open WebUI
# Limiter desabilitado para acesso via API sem CAPTCHA
# use_default_settings: true mantém TODOS os ~100 engines padrão ativos.
# A seção "engines:" abaixo apenas sobrescreve engines específicos
# ou habilita engines que vêm DESATIVADOS por padrão.

use_default_settings: true

server:
  limiter: false
  image_proxy: true

search:
  safe_search: 0
  autocomplete: "google"
  default_lang: "pt-BR"
  formats:
    - html
    - json

engines:
  # --- Busca Geral (já ativos por padrão, apenas ajustes finos) ---
  - name: google
    engine: google
    shortcut: g
    use_mobile_ui: false
    weight: 2           # Peso maior = aparece primeiro nos resultados

  - name: bing
    engine: bing
    shortcut: b
    weight: 1

  - name: duckduckgo
    engine: duckduckgo
    shortcut: d
    weight: 1

  - name: brave
    engine: brave
    shortcut: br
    weight: 1

  # --- Conhecimento e Referência ---
  - name: wikipedia
    engine: wikipedia
    shortcut: w
    base_url: "https://pt.wikipedia.org/"

  - name: wikidata
    engine: wikidata
    shortcut: wd

  # --- Código e Tecnologia (desativados por padrão, habilitados aqui) ---
  - name: github
    engine: github
    shortcut: gh
    disabled: false     # Desativado por padrão no SearXNG

  - name: stackoverflow
    engine: stackoverflow
    shortcut: so
    disabled: false     # Desativado por padrão no SearXNG

  - name: npm
    engine: npm
    shortcut: npm
    disabled: false     # Desativado por padrão no SearXNG

  - name: pypi
    engine: pypi
    shortcut: pypi
    disabled: false     # Desativado por padrão no SearXNG

  # --- Notícias e Atualidades ---
  - name: google news
    engine: google_news
    shortcut: gn
    disabled: false     # Desativado por padrão no SearXNG

  # --- Vídeo ---
  - name: youtube
    engine: youtube_noapi
    shortcut: yt

  # --- Discussões e Comunidade ---
  - name: reddit
    engine: reddit
    shortcut: r
    disabled: false     # Desativado por padrão no SearXNG
