services:
  hermes:
    build:
      context: .
      dockerfile: docker/hermes.Dockerfile
    restart: unless-stopped
    entrypoint: [ "/usr/local/bin/hermes-all-in-one.sh" ]
    ports:
      - "${HERMES_PUBLIC_PORT}:${HERMES_API_PORT_CORE}"
    expose:
      - "${HERMES_API_PORT_CORE}"
      - "${HERMES_API_PORT_ENS}"
      - "${HERMES_API_PORT_CLEMENTINO}"
    env_file:
      - .env
    volumes:
      - ./data/hermes:/opt/data
    environment:
      GATEWAY_ALLOW_ALL_USERS: "true"
      HERMES_DATA_PATH: "/opt/data"

  kanban-hermes:
    build:
      context: .
      dockerfile: docker/hermes.Dockerfile
    restart: unless-stopped
    entrypoint: [ "/usr/local/bin/hermes-kanban-dashboard.sh" ]
    expose:
      - "${HERMES_KANBAN_PORT}"
    labels:
      - traefik.enable=true
      - traefik.http.routers.kanban-hermes-${COMPOSE_PROJECT_NAME}.rule=Host(`${HERMES_SUBDOMAIN}`)
      - traefik.http.routers.kanban-hermes-${COMPOSE_PROJECT_NAME}.entrypoints=websecure
      - traefik.http.routers.kanban-hermes-${COMPOSE_PROJECT_NAME}.tls.certresolver=letsencrypt
      - traefik.http.routers.kanban-hermes-${COMPOSE_PROJECT_NAME}.middlewares=kanban-hermes-${COMPOSE_PROJECT_NAME}-auth
      - traefik.http.services.kanban-hermes-${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=${HERMES_KANBAN_PORT}
      - traefik.http.routers.kanban-hermes-${COMPOSE_PROJECT_NAME}-http.rule=Host(`${HERMES_SUBDOMAIN}`)
      - traefik.http.routers.kanban-hermes-${COMPOSE_PROJECT_NAME}-http.entrypoints=web
      - traefik.http.routers.kanban-hermes-${COMPOSE_PROJECT_NAME}-http.middlewares=kanban-hermes-${COMPOSE_PROJECT_NAME}-redirect
      - traefik.http.middlewares.kanban-hermes-${COMPOSE_PROJECT_NAME}-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.kanban-hermes-${COMPOSE_PROJECT_NAME}-auth.basicauth.users=${HERMES_KANBAN_AUTH_USER}:${HERMES_KANBAN_AUTH_PASSWORD_HASH}
    env_file:
      - .env
    volumes:
      - ./data/hermes:/opt/data
    environment:
      HERMES_DATA_PATH: "/opt/data"
      HERMES_KANBAN_PORT: "${HERMES_KANBAN_PORT}"

  paperclip-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: paperclip
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: ${PAPERCLIP_DB_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U paperclip -d paperclip" ]
      interval: 5s
      timeout: 5s
      retries: 10

  paperclip:
    build:
      context: .
      dockerfile: docker/paperclip.Dockerfile
    restart: unless-stopped
    depends_on:
      paperclip-db:
        condition: service_healthy
    ports:
      - "${PAPERCLIP_PUBLIC_PORT}:3100"
    labels:
      - traefik.enable=true
      - traefik.http.routers.paperclip-${COMPOSE_PROJECT_NAME}.rule=Host(`${PAPERCLIP_SUBDOMAIN}`)
      - traefik.http.routers.paperclip-${COMPOSE_PROJECT_NAME}.entrypoints=websecure
      - traefik.http.routers.paperclip-${COMPOSE_PROJECT_NAME}.tls.certresolver=letsencrypt
      - traefik.http.services.paperclip-${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=3100
      - traefik.http.routers.paperclip-${COMPOSE_PROJECT_NAME}-http.rule=Host(`${PAPERCLIP_SUBDOMAIN}`)
      - traefik.http.routers.paperclip-${COMPOSE_PROJECT_NAME}-http.entrypoints=web
      - traefik.http.routers.paperclip-${COMPOSE_PROJECT_NAME}-http.middlewares=paperclip-${COMPOSE_PROJECT_NAME}-redirect
      - traefik.http.middlewares.paperclip-${COMPOSE_PROJECT_NAME}-redirect.redirectscheme.scheme=https
    volumes:
      - ./data/paperclip:/paperclip
      - ./data/hermes:/paperclip/.hermes
    env_file:
      - .env
    environment:
      PAPERCLIP_PUBLIC_URL: "https://${PAPERCLIP_SUBDOMAIN}"
      PAPERCLIP_ALLOWED_HOSTNAMES: "${PAPERCLIP_SUBDOMAIN},${VPS_IP}:${PAPERCLIP_PUBLIC_PORT}"
      DATABASE_URL: "postgresql://paperclip:${PAPERCLIP_DB_PASSWORD}@paperclip-db:5432/paperclip"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      HERMES_HOME: "/paperclip/.hermes"
      HERMES_DATA_PATH: "/paperclip/.hermes"
      ADMIN_NAME: "${ADMIN_NAME}"
      ADMIN_EMAIL: "${ADMIN_EMAIL}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"

  searxng:
    image: ghcr.io/searxng/searxng:latest
    restart: unless-stopped
    ports:
      - "${SEARXNG_PUBLIC_PORT}:8080"
    labels:
      - traefik.enable=true
      - traefik.http.routers.searxng-${COMPOSE_PROJECT_NAME}.rule=Host(`searxng.${TRAEFIK_HOST}`)
      - traefik.http.routers.searxng-${COMPOSE_PROJECT_NAME}.entrypoints=websecure
      - traefik.http.routers.searxng-${COMPOSE_PROJECT_NAME}.tls.certresolver=letsencrypt
      - traefik.http.services.searxng-${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=8080
    environment:
      - SEARXNG_SECRET=${SEARXNG_SECRET}
    volumes:
      - ./config/searxng/settings.yml:/etc/searxng/settings.yml:ro
      - searxng-cache:/var/cache/searxng

  open-webui:
    build:
      context: .
      dockerfile: docker/openwebui.Dockerfile
    restart: unless-stopped
    ports:
      - "${OPENWEBUI_PUBLIC_PORT}:8080"
    labels:
      - traefik.enable=true
      - traefik.http.routers.openwebui-${COMPOSE_PROJECT_NAME}.rule=Host(`${CHAT_SUBDOMAIN}`)
      - traefik.http.routers.openwebui-${COMPOSE_PROJECT_NAME}.entrypoints=websecure
      - traefik.http.routers.openwebui-${COMPOSE_PROJECT_NAME}.tls.certresolver=letsencrypt
      - traefik.http.services.openwebui-${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=8080
      - traefik.http.routers.openwebui-${COMPOSE_PROJECT_NAME}-http.rule=Host(`${CHAT_SUBDOMAIN}`)
      - traefik.http.routers.openwebui-${COMPOSE_PROJECT_NAME}-http.entrypoints=web
      - traefik.http.routers.openwebui-${COMPOSE_PROJECT_NAME}-http.middlewares=openwebui-${COMPOSE_PROJECT_NAME}-redirect
      - traefik.http.middlewares.openwebui-${COMPOSE_PROJECT_NAME}-redirect.redirectscheme.scheme=https
    volumes:
      - ./data/open-webui:/app/backend/data
    environment:
      OPENAI_API_BASE_URL: "http://hermes:${HERMES_API_PORT_CORE}/v1"
      OPENAI_API_KEY: "${HERMES_API_KEY_CORE}"
      DEFAULT_MODELS: "hermes-agent"
      ADMIN_NAME: "${ADMIN_NAME}"
      ADMIN_EMAIL: "${ADMIN_EMAIL}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      WEBUI_AUTH: "true"

volumes:
  searxng-cache:
  postgres-data:
